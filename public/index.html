<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Adnan's Territory</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div id="callScreen" class="call-screen controls-visible">
      <div class="remote-stage">
        <video id="remoteVideo" autoplay playsinline></video>
        <div class="video-empty remote-empty">
          Waiting for the other person's video to appear.
        </div>
      </div>

      <div class="screen-gradient"></div>

      <header class="top-hud">
        <div class="app-chip">
          <p class="app-name">Orbit Call</p>
          <p id="statusText" class="status-text" data-state="idle">idle</p>
        </div>

        <div class="room-card">
          <label class="room-label" for="roomId">Room ID</label>
          <div class="room-actions">
            <input id="roomId" class="room-input" type="text" value="demo-room" />
            <button id="joinButton" class="action-button">Join</button>
            <button id="startCallButton" class="action-button action-button-accent">
              Start
            </button>
          </div>
        </div>
      </header>

      <aside class="local-preview">
        <div class="local-preview-header">
          <span>You</span>
        </div>
        <video id="localVideo" autoplay playsinline muted></video>
        <div class="video-empty local-empty">Your camera preview lives here.</div>
      </aside>

      <div id="controlsOverlay" class="controls-overlay">
        <div class="controls-pill">
          <button
            id="toggleMicButton"
            class="control-button"
            type="button"
            aria-label="Toggle microphone"
            title="Toggle microphone"
          >
            🎤
          </button>
          <button
            id="toggleCameraButton"
            class="control-button"
            type="button"
            aria-label="Toggle camera"
            title="Toggle camera"
          >
            📷
          </button>
          <button
            id="endCallButton"
            class="control-button control-button-end"
            type="button"
            aria-label="End call"
            title="End call"
          >
            📞
          </button>
        </div>
      </div>
    </div>

    <script src="/config.js"></script>
    <script src="/client.js"></script>
  </body>
</html>
